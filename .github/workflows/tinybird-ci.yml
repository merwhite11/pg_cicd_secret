name: Tinybird - CI Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - master
    types: [opened, reopened, labeled, unlabeled, synchronize]

concurrency: ${{ github.workflow }}-${{ github.event.pull_request.number }}

env:
  TINYBIRD_HOST: ${{ secrets.TINYBIRD_HOST }}
  TINYBIRD_TOKEN: ${{ secrets.TINYBIRD_TOKEN }}

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: '.'
    services:
      tinybird:
        image: tinybirdco/tinybird-local:latest
        ports:
          - 7181:7181
    steps:
      - uses: actions/checkout@v3
      - name: Install Tinybird CLI
        run: curl https://tinybird.co | sh
      - name: Add PostgreSQL host & port
        run: tb secret set PG_HOST_PORT ${{ secrets.PG_HOST_PORT }}
      - name: Add PostgreSQL database
        run: tb secret set PG_DB ${{ secrets.PG_DB }}
      - name: Add PostgreSQL username
        run: tb secret set PG_USERNAME ${{ secrets.PG_USERNAME }}
      - name: Add PostgreSQL password
        run: tb secret set PG_PASSWORD ${{ secrets.PG_PASSWORD }}
      - name: Build project
        run: tb --debug build
      - name: Check secrets (cloud)
        run: tb --cloud --host ${{ env.TINYBIRD_HOST }} --token ${{ env.TINYBIRD_TOKEN }} secret ls
      - name: Test cloud PG connection
        run: |
          tb --cloud --host ${{ env.TINYBIRD_HOST }} --token ${{ env.TINYBIRD_TOKEN }} \
            sql "SELECT count() FROM postgresql({{tb_secret('PG_HOST_PORT')}}, {{tb_secret('PG_DB')}}, 'brand', {{tb_secret('PG_USERNAME')}},{{tb_secret('PG_PASSWORD')}}) LIMIT 1"
      - name: Deployment check
        run: tb --cloud --host ${{ env.TINYBIRD_HOST }} --token ${{ env.TINYBIRD_TOKEN }} deploy --check
      - name: Capture Tinybird server logs                                                                                                           
        if: always()                                                                                                                               
        run: |
          CONTAINER=$(docker ps -q --filter "ancestor=tinybirdco/tinybird-local:latest")
          echo "=== Tinybird server log ==="
          docker exec $CONTAINER tail -300 /var/log/tinybird-local-server.log
          echo "=== ClickHouse query log ==="
          docker exec $CONTAINER tail -300 /var/log/clickhouse-server/clickhouse-server.log
      - name: Check secrets
        run: tb secret ls
      - name: Deployment check
        run: tb --cloud --host ${{ env.TINYBIRD_HOST }} --token ${{ env.TINYBIRD_TOKEN }} deploy --check --allow-destructive-operations
      - name: Find logs inside container
        if: always()
        run: |
          CONTAINER=$(docker ps -q --filter "ancestor=tinybirdco/tinybird-local:latest")
          docker exec $CONTAINER find /var/log -type f 2>/dev/null
          docker exec $CONTAINER find /app -name "*.log" -type f 2>/dev/null